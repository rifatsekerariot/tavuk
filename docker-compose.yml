version: '3.3'

services:
  web:
    build: .
    restart: always
    ports:
      - "127.0.0.1:9040:8000"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ariot
      - MQTT_BROKER=mqtt
      - MQTT_PORT=1883
    env_file:
      - .env
    depends_on:
      - db
      - mqtt
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/settings')"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ariot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  mqtt:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -W 3 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  mock_sensor:
    build: .
    restart: always
    command: python mock_mqtt.py
    environment:
      - MQTT_BROKER=mqtt
      - MQTT_PORT=1883
    depends_on:
      - mqtt
      - web
    healthcheck:
      test: ["CMD", "python", "-c", "import os, time; exit(0 if time.time() - os.path.getmtime('/tmp/heartbeat') < 120 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3

  # [MOCK_SIMULATION_ONLY] Can be safely removed in production
  mock_scada:
    build: .
    restart: always
    command: python mock_scada_controller.py
    environment:
      - MQTT_BROKER=mqtt
      - MQTT_PORT=1883
    depends_on:
      - mqtt
      - web
    healthcheck:
      test: ["CMD", "python", "-c", "import os, time; exit(0 if time.time() - os.path.getmtime('/tmp/heartbeat_scada') < 60 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  mosquitto_data:
  mosquitto_log:
