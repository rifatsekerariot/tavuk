<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARIOT | Giriş Yap</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e293b 0%, #0f172a 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .btn-gradient {
            background: linear-gradient(135deg, #38bdf8 0%, #0369a1 100%);
            transition: all 0.25s ease;
        }
        .btn-gradient:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 20px -10px rgba(56, 189, 248, 0.5);
            background: linear-gradient(135deg, #7dd3fc 0%, #0284c7 100%);
        }
    </style>
</head>
<body class="selection:bg-sky-500 selection:text-white">
    <div class="glass-panel w-full max-w-[420px] rounded-2xl p-8 relative overflow-hidden animate-fade-in">
        <!-- Ambient background glow inside panel -->
        <div class="absolute -top-[50px] -right-[50px] w-[150px] h-[150px] bg-sky-500/10 rounded-full blur-[40px] pointer-events-none"></div>
        <div class="absolute -bottom-[50px] -left-[50px] w-[150px] h-[150px] bg-indigo-500/10 rounded-full blur-[40px] pointer-events-none"></div>

        <!-- Logo / Brand -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 bg-sky-500/10 border border-sky-500/20 rounded-xl mb-4 shadow-[0_0_20px_rgba(56,189,248,0.1)]">
                <div class="w-3.5 h-3.5 bg-sky-400 rounded-full animate-pulse"></div>
            </div>
            <h1 class="text-xl font-bold tracking-tight text-white">ARIOT Karar Destek</h1>
            <p class="text-xs text-slate-400 mt-1">Lütfen kimlik bilgilerinizi girerek oturum açın.</p>
        </div>

        <!-- Error box -->
        <div id="error-box" class="hidden mb-6 p-3 bg-red-500/10 border border-red-500/20 rounded-lg text-xs text-red-400 text-center">
            Hatalı kullanıcı adı veya şifre.
        </div>

        <!-- Login Form -->
        <form onsubmit="handleLogin(event)" class="space-y-5">
            <div>
                <label class="block text-[11px] font-semibold text-slate-400 uppercase tracking-wider mb-2">Kullanıcı Adı</label>
                <input type="text" id="username" required placeholder="admin veya demo" 
                       class="w-full bg-slate-900/60 border border-slate-700/50 focus:border-sky-500 rounded-lg px-4 py-3 text-sm text-white placeholder-slate-500 outline-none transition-all duration-150">
            </div>

            <div>
                <label class="block text-[11px] font-semibold text-slate-400 uppercase tracking-wider mb-2">Şifre</label>
                <input type="password" id="password" required placeholder="••••••••" 
                       class="w-full bg-slate-900/60 border border-slate-700/50 focus:border-sky-500 rounded-lg px-4 py-3 text-sm text-white placeholder-slate-500 outline-none transition-all duration-150">
            </div>

            <button type="submit" class="w-full btn-gradient text-white py-3.5 rounded-lg text-sm font-semibold tracking-wide transition-all shadow-[0_4px_12px_rgba(3,105,161,0.2)]">
                Giriş Yap
            </button>
        </form>

        <div class="mt-6 pt-6 border-t border-slate-800 flex justify-between text-[11px] text-slate-400">
            <span>Demo Şifresi: <code class="bg-slate-900/60 px-1.5 py-0.5 rounded text-sky-400">demo123</code></span>
            <span>v2.1.0</span>
        </div>
    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const eb = document.getElementById('error-box');

            eb.classList.add('hidden');

            fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p })
            })
            .then(async r => {
                const data = await r.json();
                if (!r.ok) {
                    throw new Error(data.detail || 'Giriş başarısız.');
                }
                return data;
            })
            .then(data => {
                // Store user context in session/local storage
                localStorage.setItem('user_role', data.role);
                localStorage.setItem('username', data.username);
                window.location.href = '/demo';
            })
            .catch(err => {
                eb.innerText = err.message;
                eb.classList.remove('hidden');
            });
        }
    </script>
</body>
</html>
