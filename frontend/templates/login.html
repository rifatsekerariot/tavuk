<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARIOT | Giriş Yap</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: url('/static/arkaplan.png') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 20px 40px -15px rgba(15, 23, 42, 0.15);
        }
        .btn-theme {
            background-color: #1e293b;
            color: #ffffff;
            transition: all 0.2s ease;
        }
        .btn-theme:hover {
            background-color: #0f172a;
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(15, 23, 42, 0.1);
        }
    </style>
</head>
<body class="selection:bg-emerald-500 selection:text-white">
    <div class="glass-panel w-full max-w-[420px] rounded-2xl p-8 relative overflow-hidden animate-fade-in">
        <!-- Ambient background glow inside panel -->
        <div class="absolute -top-[50px] -right-[50px] w-[150px] h-[150px] bg-emerald-500/5 rounded-full blur-[40px] pointer-events-none"></div>
        <div class="absolute -bottom-[50px] -left-[50px] w-[150px] h-[150px] bg-slate-500/5 rounded-full blur-[40px] pointer-events-none"></div>

        <!-- Logo / Brand -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 bg-emerald-600/10 border border-emerald-600/20 rounded-xl mb-4 shadow-[0_0_20px_rgba(5,150,105,0.1)]">
                <div class="w-3 h-3 bg-emerald-600 rounded-full animate-pulse"></div>
            </div>
            <h1 class="text-xl font-bold tracking-tight text-slate-900">ARIOT Karar Destek</h1>
            <p class="text-xs text-slate-500 mt-1">Lütfen kimlik bilgilerinizi girerek oturum açın.</p>
        </div>

        <!-- Error box -->
        <div id="error-box" class="hidden mb-6 p-3 bg-red-500/10 border border-red-500/20 rounded-lg text-xs text-red-600 text-center font-medium">
            Hatalı kullanıcı adı veya şifre.
        </div>

        <!-- Login Form -->
        <form onsubmit="handleLogin(event)" class="space-y-5">
            <div>
                <label class="block text-[11px] font-semibold text-slate-500 uppercase tracking-wider mb-2">Kullanıcı Adı</label>
                <input type="text" id="username" required placeholder="Kullanıcı Adı" 
                       class="w-full bg-white border border-slate-200 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 rounded-lg px-4 py-3 text-sm text-slate-900 placeholder-slate-400 outline-none transition-all duration-150">
            </div>

            <div>
                <label class="block text-[11px] font-semibold text-slate-500 uppercase tracking-wider mb-2">Şifre</label>
                <input type="password" id="password" required placeholder="••••••••" 
                       class="w-full bg-white border border-slate-200 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 rounded-lg px-4 py-3 text-sm text-slate-900 placeholder-slate-400 outline-none transition-all duration-150">
            </div>

            <button type="submit" class="w-full btn-theme py-3.5 rounded-lg text-sm font-semibold tracking-wide transition-all shadow-[0_4px_12px_rgba(15,23,42,0.08)]">
                Giriş Yap
            </button>
        </form>

        <div class="mt-6 pt-6 border-t border-slate-200 flex justify-between text-[11px] text-slate-500">
            <span>Demo Girişi: <code class="bg-emerald-50 text-emerald-700 px-1.5 py-0.5 rounded font-mono font-bold">demo / demo123</code></span>
            <span>v2.1.0</span>
        </div>
    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const eb = document.getElementById('error-box');

            eb.classList.add('hidden');

            fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p })
            })
            .then(async r => {
                const data = await r.json();
                if (!r.ok) {
                    throw new Error(data.detail || 'Giriş başarısız.');
                }
                return data;
            })
            .then(data => {
                // Store user context in session/local storage
                localStorage.setItem('user_role', data.role);
                localStorage.setItem('username', data.username);
                window.location.href = '/demo';
            })
            .catch(err => {
                eb.innerText = err.message;
                eb.classList.remove('hidden');
            });
        }
    </script>
</body>
</html>
